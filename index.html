<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="PrivMITLab - Free Music Player & Live Radio. Search and stream millions of songs. Hindi, Bollywood, Bhojpuri, Punjabi music + 50000 radio stations." />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>PrivMITLab – Music Player & Live Radio 🎵</title>
</head>

<body>
    <div id="root"></div>
    <!-- ─── WebView Background Audio Hack ─────────────────── -->
    <script>
        (function () {
            var silentAudio = null;

            function createSilentAudio() {
                try {
                    // Tiny silent WAV — keeps audio channel "active" in WebView
                    var wav = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
                    silentAudio = new Audio(wav);
                    silentAudio.loop = true;
                    silentAudio.volume = 0.01;
                    silentAudio.play().catch(function () { });
                } catch (e) { }
            }

            // Create on first user interaction (WebView requires gesture)
            function onFirstInteraction() {
                if (!silentAudio) createSilentAudio();
                document.removeEventListener('click', onFirstInteraction);
                document.removeEventListener('touchstart', onFirstInteraction);
            }
            document.addEventListener('click', onFirstInteraction, { once: true });
            document.addEventListener('touchstart', onFirstInteraction, { once: true });

            // Keep WebView alive by periodically touching the title
            setInterval(function () {
                try {
                    var t = document.title;
                    document.title = '\u25CF ' + new Date().toLocaleTimeString();
                    requestAnimationFrame(function () { document.title = t; });
                } catch (e) { }
            }, 15000);

            // Resume silent audio when app comes back to foreground
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden && silentAudio && silentAudio.paused) {
                    silentAudio.play().catch(function () { });
                }
            });
        })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
